<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GmailGenie</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-icon">&#128197;</span>
      <span class="logo-text">GmailGenie</span>
    </div>
    <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
  </header>

  <!-- Main content — state rendered by popup.js -->
  <main id="main-content"></main>

  <!-- Settings drawer -->
  <div id="settings-panel" class="settings-panel hidden">
    <h3>Settings</h3>
    <div class="form-group">
      <label for="api-key-input">Anthropic API Key</label>
      <input
        type="password"
        id="api-key-input"
        placeholder="sk-ant-..."
        autocomplete="off"
      />
      <p class="hint">Stored locally. Never sent anywhere except api.anthropic.com.</p>
    </div>
    <div class="form-group notif-group">
      <label>When an event is detected</label>
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="notif-mode" value="none" />
          <span class="radio-content">
            <span class="radio-title">None</span>
            <span class="radio-desc">Only shows when you open the popup</span>
          </span>
        </label>
        <label class="radio-option">
          <input type="radio" name="notif-mode" value="badge" />
          <span class="radio-content">
            <span class="radio-title">Badge on icon</span>
            <span class="radio-desc">Green badge appears on the toolbar icon</span>
          </span>
        </label>
        <label class="radio-option">
          <input type="radio" name="notif-mode" value="card" />
          <span class="radio-content">
            <span class="radio-title">Floating card</span>
            <span class="radio-desc">Card pops up inside Gmail or Outlook</span>
          </span>
        </label>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
